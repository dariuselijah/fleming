name: Benchmark Governance

on:
  pull_request:
    paths:
      - "data/eval/**"
      - "scripts/**"
      - "docs/**"
      - "package.json"
      - "package-lock.json"
  push:
    branches: [main]
    paths:
      - "data/eval/**"
      - "scripts/**"
      - "docs/**"
      - "package.json"
      - "package-lock.json"
  workflow_dispatch:
    inputs:
      run_full_benchmarks:
        description: "Run full healthcare benchmark pipeline"
        required: false
        default: false
        type: boolean

jobs:
  governance-check:
    name: Governance Lock + Manifest Checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "18"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Verify dataset lock and run manifest
        run: npm run benchmark:governance:check

  full-healthcare-benchmarks:
    name: Full Healthcare Benchmarks (Manual)
    if: github.event_name == 'workflow_dispatch' && inputs.run_full_benchmarks == true
    needs: governance-check
    runs-on: ubuntu-latest
    timeout-minutes: 90
    env:
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
      SUPABASE_SERVICE_ROLE: ${{ secrets.SUPABASE_SERVICE_ROLE }}
      EXTERNAL_BENCH_INPUT: data/eval/external/normalized/sample_external_healthcare.json
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "18"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build app
        run: npm run build

      - name: Start app in background
        run: npm run start -- --hostname 127.0.0.1 --port 3000 &

      - name: Wait for app readiness
        run: |
          for i in {1..40}; do
            if curl -sf http://127.0.0.1:3000 > /dev/null; then
              echo "App is ready"
              exit 0
            fi
            sleep 3
          done
          echo "App failed to start in time"
          exit 1

      - name: Run full healthcare benchmark pipeline
        run: npm run benchmark:healthcare

      - name: Upload benchmark artifacts
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-artifacts
          path: |
            data/eval/retrieval_release_results.json
            data/eval/chat_release_results.json
            data/eval/external_results.json
            data/eval/healthcare_benchmark_report.md

